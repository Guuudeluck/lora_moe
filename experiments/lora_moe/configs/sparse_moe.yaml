# ============================================================
# Sparse-MoE  (top-k routing + FFN experts)
# ============================================================
# Router: linear → top-k=2 selection → softmax over selected
# Experts: 2-layer FFN delta  GELU(x @ W1_e) @ W2_e
#   Each token is hard-routed to exactly top_k=2 of 8 experts.
#
# Balance loss: Switch-Transformer sparse  L = E * Σ frac_e * p_e
#   frac_e = fraction tokens dispatched to expert e  (non-diff, from dispatch mask)
#   p_e    = mean full softmax prob for expert e      (differentiable, live graph)
# Only p_e carries gradient → correct sparse Switch-Transformer loss.
#
# Load imbalance is a key risk: monitor routing/global_cv.
# Increase balance_loss_coeff to 0.05 if expert collapse is observed.
#
# Trainable params: same as Soft-MoE ≈ 23.4M (identical architecture, different routing)

method: sparse_moe
run_name: sparse_moe_e8_h4_top2

model_name_or_path: Qwen/Qwen2.5-7B
attn_implementation: sdpa

# FFN MoE
num_experts: 8
expert_hidden_dim: 4     # H; equals lora_rank for param-budget matching
top_k: 2                 # each token is routed to exactly 2 of 8 experts
lora_dropout: 0.05
balance_loss_coeff: 0.01  # increase to 0.05 if expert collapse is observed
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Dataset
max_length: 512
val_split: 0.05

# Training
num_train_epochs: 3
per_device_train_batch_size: 16
gradient_accumulation_steps: 2    # effective batch = 32
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_steps: 30
weight_decay: 0.0
max_grad_norm: 1.0
optim: adamw_torch_fused
gradient_checkpointing: true

eval_steps: 200
save_steps: 200
logging_steps: 10
save_total_limit: 2
report_to: tensorboard

output_dir: outputs/sparse_moe_e8_h4_top2
seed: 42
debug_max_samples: 512
dataloader_num_workers: 8
