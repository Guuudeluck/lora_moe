# Stage B: Soft-LoRA-MoE (ABMIL) on Qwen2.5-14B / UltraChat-200k
# Primary question: does Soft-LoRA-MoE maintain quality without load pathologies?

model_name_or_path: Qwen/Qwen2.5-14B
method: soft_lora_moe
dataset_type: ultrachat
output_dir: outputs/stageB_soft_lora_moe

# Sequence length
max_length: 1024

# Training schedule
num_train_epochs: 3
per_device_train_batch_size: 8
gradient_accumulation_steps: 4    # effective batch = 32  (2x throughput vs bs=4/accum=8)
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_steps: 50

# Optimizer
optim: adamw_torch_fused
weight_decay: 0.0
max_grad_norm: 1.0

# Precision & memory
gradient_checkpointing: true
bf16: true

# Eval / save
eval_steps: 500
save_steps: 500
logging_steps: 20
save_total_limit: 2

# Logging
report_to: tensorboard

# LoRA / MoE architecture
target_modules: [q_proj, k_proj, v_proj, o_proj]
num_experts: 8
lora_rank: 8
attention_dim: 64
balance_loss_coeff: 0.01

# Reproducibility
seed: 42
