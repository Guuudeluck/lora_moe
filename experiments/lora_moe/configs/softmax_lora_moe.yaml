# ============================================================
# Baseline 2: Softmax MoE LoRA  (standard MoE routing)
# ============================================================
# Router: linear projection → softmax (or top-k sparse)
# Experts are COMPETITIVE (probabilities sum to 1)
# Balance loss: Switch-Transformer style  L = E * sum(f_i * p_i)

method: softmax_lora_moe
run_name: softmax_lora_moe_e8_r4

# Model
model_name_or_path: Qwen/Qwen2.5-1.5B
attn_implementation: sdpa

# LoRA MoE
lora_rank: 4              # ← r=4 so total LoRA params ≈ standard r=16  (8 × 4 = 32 effective rank)
lora_alpha: 4
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# MoE-specific
num_experts: 8
top_k: 0                  # 0 = dense softmax; set to 2 for sparse top-2 routing
balance_loss_coeff: 0.01  # Switch-Transformer balance loss weight

# Trainable param budget (approx, Qwen2.5-1.5B, r=4, 8 experts):
#   LoRA params:   8 × (standard_r4_params) ≈ 8 × 2.55M = 20.4M
#   Router params: 28 × 4 × 1536×8 = ~0.7M
#   Total ≈ 21M (vs ~10M for standard r=16 — ~2× more, acceptable)
#
# For a truly parameter-matched comparison use:
#   standard:     lora_rank: 16  (target: q,v,k,o)  → ~10M trainable
#   softmax_lora_moe:  lora_rank: 4,  num_experts: 4      → ~10M trainable

# Dataset
max_length: 512
val_split: 0.05

# Training  (identical to standard_lora for fair comparison)
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
optim: adamw_torch_fused
gradient_checkpointing: true

# Logging / Checkpointing
eval_steps: 200
save_steps: 200
logging_steps: 10
save_total_limit: 2
report_to: tensorboard

# Output
output_dir: outputs/softmax_lora_moe_e8_r4
seed: 42

debug_max_samples: 512
