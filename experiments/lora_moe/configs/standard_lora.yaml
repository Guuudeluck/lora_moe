# ============================================================
# Baseline 1: Standard LoRA  (single adapter, PEFT-style)
# ============================================================

method: standard
run_name: standard_lora_r16

# Model
model_name_or_path: Qwen/Qwen2.5-1.5B        # swap to Qwen2.5-7B for bigger run
attn_implementation: sdpa        # requires flash-attn; set "eager" if unavailable

# LoRA
lora_rank: 16
lora_alpha: 16          # scaling = alpha / rank = 1.0
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# Trainable param budget (approx, Qwen2.5-1.5B):
#   q_proj: [1536, 1536]  → A:[1536,16] B:[16,1536] = 49152 × 2 = ~98K params/layer
#   v_proj: [1536, 256]   → A:[1536,16] B:[16,256]  = ~28K params/layer
#   k_proj: [1536, 256]   → same as v_proj
#   o_proj: [1536, 1536]  → same as q_proj
#   × 28 layers → total trainable ≈ 10.2M params

# Dataset
max_length: 512
val_split: 0.05
# max_samples: 10000     # uncomment to subsample for quick run

# Training
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4        # effective batch = 16
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
optim: adamw_torch_fused
gradient_checkpointing: true

# Logging / Checkpointing
eval_steps: 200
save_steps: 200
logging_steps: 10
save_total_limit: 2
report_to: tensorboard      # change to "wandb" if W&B is configured

# Output
output_dir: outputs/standard_lora_r16
seed: 42

# Debug shortcut (used when --debug flag is passed)
debug_max_samples: 512
