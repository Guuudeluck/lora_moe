# ============================================================
# Proposed: ABMIL MoE LoRA
# ============================================================
# Router: tanh(V·x) ⊙ sigmoid(U·x) → W → sigmoid scores
# Experts are INDEPENDENT (sigmoid, not softmax → can all activate)
# Balance loss: variance of per-expert mean activation
#
# Key differences from Softmax MoE:
#   - Gated attention router (richer representation)
#   - Sigmoid scoring (independent experts, not competitive)
#   - Each expert can contribute between 0 and 1 regardless of others

method: abmil_moe
run_name: abmil_moe_e8_r4

# Model
model_name_or_path: Qwen/Qwen2.5-1.5B
attn_implementation: sdpa

# LoRA MoE
lora_rank: 4
lora_alpha: 4
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# MoE-specific
num_experts: 8
attention_dim: 128        # ABMIL gated attention hidden dim
balance_loss_coeff: 0.01  # weight of variance-based balance loss

# Trainable param budget (approx, Qwen2.5-1.5B, r=4, 8 experts):
#   LoRA params:    same as softmax_moe ≈ 20.4M
#   Router (ABMIL): 28 × 4 × (1536×128×2 + 128×8) ≈ 1.4M   (vs 0.7M for softmax)
#   Total ≈ 21.8M  (router is slightly bigger due to V+U projection)

# Dataset
max_length: 512
val_split: 0.05

# Training  (identical hyperparameters for fair comparison)
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
optim: adamw_torch_fused
gradient_checkpointing: true

# Logging / Checkpointing
eval_steps: 200
save_steps: 200
logging_steps: 10
save_total_limit: 2
report_to: tensorboard

# Output
output_dir: outputs/abmil_moe_e8_r4
seed: 42

debug_max_samples: 512
